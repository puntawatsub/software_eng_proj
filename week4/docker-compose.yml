version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: shoppingcart-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: shopping_cart_localization
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: puntawatsubhamani/week4_homework_softengproj2:latest
    container_name: shoppingcart-app
    depends_on:
      - db
    environment:
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
#    network_mode: bridge # it cancels network of docker -> docker cannot find host db.
volumes:
  db_data:
